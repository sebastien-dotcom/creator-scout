function parseCSV(text){
var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
if(lines.length<2)return[];
// Parse header
var hdr=parseCSVLine(lines[0]).map(function(h){return h.toLowerCase().trim()});
var nameIdx=-1,igIdx=-1,niIdx=-1,foIdx=-1,ofIdx=-1,scIdx=-1,notesIdx=-1;
hdr.forEach(function(h,i){
if(h==="name"||h==="creator"||h==="creator name")nameIdx=i;
else if(h==="ig"||h==="instagram"||h==="ig handle"||h==="handle"||h==="ig url"||h==="instagram url")igIdx=i;
else if(h==="niche"||h==="industry"||h==="category")niIdx=i;
else if(h==="followers"||h==="foll"||h==="follower count")foIdx=i;
else if(h==="offer"||h==="current offer"||h==="offer type")ofIdx=i;
else if(h==="score"||h==="scout score")scIdx=i;
else if(h==="notes"||h==="opportunity"||h==="opp"||h==="response notes")notesIdx=i;
});
if(nameIdx===-1){
// Try first column as name
nameIdx=0;if(igIdx===-1&&hdr.length>1)igIdx=1;
}
var rows=[];
for(var i=1;i<lines.length;i++){
var cols=parseCSVLine(lines[i]);
var name=cols[nameIdx]?cols[nameIdx].trim():"";
if(!name)continue;
var ig=igIdx>=0&&cols[igIdx]?cols[igIdx].trim():"";
// Extract handle from URL if needed
if(ig.indexOf("instagram.com")>=0){var m=ig.match(/instagram\.com\/([^\/\?#]+)/);if(m)ig=m[1];}
ig=ig.replace(/^@/,"").replace(/\/.*$/,"").trim();
if(!ig)ig=name.toLowerCase().replace(/[^a-z0-9._]/g,"");
var ni=niIdx>=0&&cols[niIdx]?matchNiche(cols[niIdx].trim()):"Online Business";
var fo=foIdx>=0&&cols[foIdx]?cols[foIdx].trim():"Unknown";
var of_=ofIdx>=0&&cols[ofIdx]?cols[ofIdx].trim():"Unknown";
var sc=scIdx>=0&&cols[scIdx]?parseInt(cols[scIdx])||75:75;
var notes=notesIdx>=0&&cols[notesIdx]?cols[notesIdx].trim():"Imported from CSV — needs research.";
rows.push({name:name,ig:ig,ni:ni,fo:fo,of:of_,sc:sc,notes:notes});
}
return rows;
}

function parseCSVLine(line){
var result=[],current="",inQuotes=false;
for(var i=0;i<line.length;i++){
var ch=line[i];
if(ch==='"'){if(inQuotes&&line[i+1]==='"'){current+='"';i++}else{inQuotes=!inQuotes}}

window.saveScheduledPost=function(){
var date=document.getElementById("schedDate").value;
if(!date){alert("Pick a date");return}
var parts=date.split("-");
var dateStr=parseInt(parts[1])+"/"+parseInt(parts[2])+"/"+parts[0];
window._scheduled.push({
date:dateStr,
creator:document.getElementById("schedCreator").value,

};

render();
};
